<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネーリテラシー残酷判定テスト</title>
<style>
    body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; line-height: 1.6; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #333; font-size: 1.5em; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .q-area { font-weight: bold; color: #0056b3; margin-bottom: 10px; }
    .question { font-size: 1.2em; margin-bottom: 20px; font-weight: bold; }
    .options button { display: block; width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; background: #fdfdfd; cursor: pointer; text-align: left; font-size: 1em; transition: 0.2s; }
    .options button:hover { background: #eef; border-color: #0056b3; }
    .hidden { display: none; }
    .result-item { margin-bottom: 20px; padding: 15px; border-radius: 8px; border-left: 5px solid #ccc; background: #fafafa; }
    .result-item.foolish { border-left-color: #dc3545; background: #fff8f8; }
    .result-item.correct { border-left-color: #28a745; background: #f8fff9; }
    .judgment { font-weight: bold; margin-bottom: 5px; }
    .foolish .judgment { color: #dc3545; }
    .correct .judgment { color: #28a745; }
    .restart-btn { display: block; width: 100%; padding: 15px; background: #333; color: #fff; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; margin-top: 30px; }
    .restart-btn:hover { background: #555; }
</style>
</head>
<body>

<div class="container" id="app">
    <h1>マネーリテラシー判定</h1>
    
    <div id="quiz-screen">
        <div class="q-area" id="q-area"></div>
        <div class="question" id="q-text"></div>
        <div class="options" id="q-options"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>あなたの選択と現実</h2>
        <div id="result-list"></div>
        <button class="restart-btn" onclick="location.reload()">もう一度やり直す</button>
    </div>
</div>

<script>
    const questions = [
        {
            area: "【第1分野：生活設計・家計管理】",
            text: "毎月のお給料が入りました。お金の管理をどうしますか？",
            options: [
                { 
                    text: "家計簿を一切つけず、自分が欲しいものを自由に買う", 
                    isCorrect: false,
                    judgment: "極めて愚か",
                    explanation: "支出を把握せず欲望のままに消費する行為は、穴の空いたバケツに水を注ぐのと同じです。一生お金に困り続ける典型的な貧困層の行動です。"
                },
                { 
                    text: "先に一定額を貯蓄や投資に回し、残りの範囲内で生活する", 
                    isCorrect: true,
                    judgment: "正解",
                    explanation: "収入から先に資産構築の資金を確保する「パーキンソンの法則」をハックした正しい家計管理です。"
                }
            ]
        },
        {
            area: "【第2分野：金融や経済の仕組み】",
            text: "まとまったお金が貯まりました。今後の資産形成をどうしますか？",
            options: [
                { 
                    text: "減るのが怖いので、全額をタンスに隠すか銀行に放置する", 
                    isCorrect: false,
                    judgment: "致命的に愚か",
                    explanation: "物価上昇（インフレ）によって現金の価値が目減りしていく現実に気づいていない、経済の仕組みを理解していない愚かな選択です。"
                },
                { 
                    text: "世界の経済成長を理解し、優良な株式（インデックスファンド等）を買う", 
                    isCorrect: true,
                    judgment: "正解",
                    explanation: "資本主義の仕組みを理解し、お金自身に働いて増えてもらう正しい資産運用の選択です。"
                }
            ]
        },
        {
            area: "【第3分野：消費生活・金融トラブル防止】",
            text: "友人に見栄を張るため、自分の年収以上の「高級車」が欲しくなりました。どうしますか？",
            options: [
                { 
                    text: "フルローン（借金）を組んででも、今すぐ高級車を買う", 
                    isCorrect: false,
                    judgment: "破滅的に愚か",
                    explanation: "高金利の負債を抱え、見栄という無価値なもののために未来の自由を売り渡す最悪の選択です。金融トラブルや自己破産への第一歩となります。"
                },
                { 
                    text: "見栄を捨て、身の丈に合った車を買うか公共交通機関を使う", 
                    isCorrect: true,
                    judgment: "正解",
                    explanation: "他人の目を気にせず、自身の純資産を守り不要な負債を回避する合理的な消費行動です。"
                }
            ]
        },
        {
            area: "【第4分野：キャリア教育】",
            text: "今後の収入を大きく増やしたいと考えました。何に時間とお金を使いますか？",
            options: [
                { 
                    text: "一発逆転を狙って、パチンコや宝くじに時間と全財産をつぎ込む", 
                    isCorrect: false,
                    judgment: "絶望的に愚か",
                    explanation: "ギャンブルの仕組み（胴元が勝つ）を理解しておらず、自身の「稼ぐ力」を高める努力を放棄した搾取され続ける側の選択です。"
                },
                { 
                    text: "新しいスキルや知識を得るための勉強（自己投資）に時間とお金を使う", 
                    isCorrect: true,
                    judgment: "正解",
                    explanation: "働く意義を理解し、最も投資リターンの高い自分自身のキャリアップ（人的資本）に資金を投下する正しい選択です。"
                }
            ]
        }
    ];

    let currentQuestionIndex = 0;
    const userResults = [];

    const qArea = document.getElementById('q-area');
    const qText = document.getElementById('q-text');
    const qOptions = document.getElementById('q-options');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const resultList = document.getElementById('result-list');

    function loadQuestion() {
        qOptions.innerHTML = '';
        const currentQ = questions[currentQuestionIndex];
        qArea.textContent = currentQ.area;
        qText.textContent = currentQ.text;

        currentQ.options.forEach(option => {
            const button = document.createElement('button');
            button.textContent = option.text;
            button.onclick = () => selectOption(currentQ.area, option);
            qOptions.appendChild(button);
        });
    }

    function selectOption(area, option) {
        userResults.push({
            area: area,
            text: option.text,
            isCorrect: option.isCorrect,
            judgment: option.judgment,
            explanation: option.explanation
        });
        
        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');

        userResults.forEach(result => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'result-item ' + (result.isCorrect ? 'correct' : 'foolish');
            
            itemDiv.innerHTML = `
                <div style="font-size: 0.9em; color: #666;">${result.area}</div>
                <div style="font-weight: bold; margin: 5px 0;">選択: 「${result.text}」</div>
                <div class="judgment">判定: ${result.judgment}</div>
                <div>${result.explanation}</div>
            `;
            resultList.appendChild(itemDiv);
        });
    }

    loadQuestion();
</script>
</body>
</html>
