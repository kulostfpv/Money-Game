<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>次世代マネーリテラシー判定プラットフォーム</title>
<style>
    :root { --primary: #0056b3; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; }
    body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    h1 { text-align: center; font-size: 1.6em; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .q-area { font-size: 0.95em; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
    .question { font-size: 1.25em; font-weight: bold; margin-bottom: 25px; }
    
    .options button { display: block; width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 8px; background: #fafafa; cursor: pointer; text-align: left; font-size: 1em; transition: 0.2s; }
    .options button:hover { background: #f0f4f8; border-color: var(--primary); }
    
    .rank-box { text-align: center; background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
    .rank-title { font-size: 1.1em; font-weight: bold; }
    .rank-number { font-size: 2.2em; font-weight: bold; color: var(--danger); margin: 10px 0; }
    
    .result-item { margin-bottom: 25px; padding: 20px; border-radius: 8px; border-left: 5px solid #ccc; background: #f9f9f9; }
    .res-+2 { border-left-color: var(--success); }
    .res-+1 { border-left-color: #71dd37; }
    .res-0 { border-left-color: var(--warning); }
    .res--1 { border-left-color: var(--danger); }
    
    .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.85em; font-weight: bold; color: #fff; margin-bottom: 10px; }
    .bg-+2 { background: var(--success); }
    .bg-+1 { background: #71dd37; }
    .bg-0 { background: var(--warning); color: #333; }
    .bg--1 { background: var(--danger); }

    .exp-box { font-size: 0.95em; background: #fff; padding: 12px; border-radius: 4px; border: 1px solid #eee; margin-top: 5px; }
    .advice-box { font-size: 0.95em; background: #e8f4f8; padding: 12px; border-radius: 4px; border: 1px solid #b8daff; margin-top: 10px; color: #004085; font-weight: bold; }
    
    .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; }
    
    .hidden { display: none; }
</style>
</head>
<body>

<div class="container">
    <div id="screen-play">
        <h1>マネーリテラシー判定テスト</h1>
        <div id="quiz-area">
            <div class="q-area" id="q-category"></div>
            <div class="question" id="q-text"></div>
            <div class="options" id="q-options"></div>
        </div>
        
        <div id="result-area" class="hidden">
            <h1>判定結果とフィードバック</h1>
            <div class="rank-box">
                <div class="rank-title">あなたの全国暫定順位</div>
                <div class="rank-number" id="rank-display">計算中...</div>
                <div id="score-display" style="font-weight:bold; color:var(--primary);"></div>
            </div>
            <div id="result-list"></div>
            <button class="submit-btn" onclick="location.reload()" style="background:#333;">最初からやり直す</button>
        </div>
    </div>
</div>

<script>

                { text: "影響力のあるビジネス系インフルエンサーのオンラインサロンに加入し、最新の情報を得る", score: 0, exp: "【大衆の行動】インプットしただけで「学んだ気」になり、主催者の養分（毎月の固定費提供者）になっている状態に陥りがちです。", advice: "オンラインサロンの月額費用を、自分の手で小さなビジネス（サーバー代や広告費など）を立ち上げる資金に回してください。" },
