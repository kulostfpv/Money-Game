<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>次世代マネーリテラシー判定プラットフォーム</title>
<style>
    :root { --primary: #0056b3; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; --info: #17a2b8; }
    body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    h1 { text-align: center; font-size: 1.6em; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .q-area { font-size: 0.95em; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
    .question { font-size: 1.25em; font-weight: bold; margin-bottom: 25px; }
    
    .options button { display: block; width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 8px; background: #fafafa; cursor: pointer; text-align: left; font-size: 1em; transition: 0.2s; }
    .options button:hover { background: #f0f4f8; border-color: var(--primary); }
    
    .rank-box { text-align: center; background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
    .rank-title { font-size: 1.1em; font-weight: bold; }
    .rank-number { font-size: 2.2em; font-weight: bold; color: var(--danger); margin: 10px 0; }
    
    .result-item { margin-bottom: 25px; padding: 20px; border-radius: 8px; border-left: 5px solid #ccc; background: #f9f9f9; }
    .res-+2 { border-left-color: var(--success); }
    .res-+1 { border-left-color: #71dd37; }
    .res-0 { border-left-color: var(--warning); }
    .res--1 { border-left-color: var(--danger); }
    
    .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.85em; font-weight: bold; color: #fff; margin-bottom: 10px; }
    .bg-+2 { background: var(--success); }
    .bg-+1 { background: #71dd37; }
    .bg-0 { background: var(--warning); color: #333; }
    .bg--1 { background: var(--danger); }

    .exp-box { font-size: 0.95em; background: #fff; padding: 12px; border-radius: 4px; border: 1px solid #eee; margin-top: 5px; }
    .advice-box { font-size: 0.95em; background: #e8f4f8; padding: 12px; border-radius: 4px; border: 1px solid #b8daff; margin-top: 10px; color: #004085; font-weight: bold; }
    
    .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; }
    
    .hidden { display: none; }
</style>
</head>
<body>

<div class="container">
    <div id="screen-play">
        <h1>マネーリテラシー残酷判定</h1>
        <div id="quiz-area">
            <div class="q-area" id="q-category"></div>
            <div class="question" id="q-text"></div>
            <div class="options" id="q-options"></div>
        </div>
        
        <div id="result-area" class="hidden">
            <h1>判定結果と改善提案</h1>
            <div class="rank-box">
                <div class="rank-title">あなたの全国暫定順位</div>
                <div class="rank-number" id="rank-display">計算中...</div>
                <div id="score-display" style="font-weight:bold; color:var(--primary);"></div>
            </div>
            <div id="result-list"></div>
            <button class="submit-btn" onclick="location.reload()" style="background:#333;">最初からやり直す</button>
        </div>
    </div>
</div>

    let scoreLog = [];

            document.getElementById('q-text').textContent = q.text;
            
            const optArea = document.getElementById('q-options');
            optArea.innerHTML = '';
            
            // 選択肢の表示をシャッフルせずそのまま出力（プロトタイプ用）
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt.text;
                btn.onclick = () => handleSelect(opt);
                optArea.appendChild(btn);
            });
        } else {
            showResults();
        }
    }

    function handleSelect(opt) {
        scoreLog.push({
            qText: questions[currentIdx].text,
            category: questions[currentIdx].category,
            selectedText: opt.text,
            score: opt.score,
            exp: opt.exp,
            advice: opt.advice
        });
        currentIdx++;
        loadQuiz();
    }

    function showResults() {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        
        const totalScore = scoreLog.reduce((sum, item) => sum + item.score, 0);
        const maxPossible = questions.length * 2;
        
        const totalUsers = 312049; 
        let percent = totalScore >= maxPossible * 0.8 ? 0.01 : totalScore >= maxPossible * 0.5 ? 0.1 : totalScore >= 0 ? 0.6 : 0.9;
        const exactRank = totalScore === maxPossible ? 1 : Math.floor(totalUsers * percent + (Math.random() * 1000));
        
        document.getElementById('rank-display').textContent = `${exactRank.toLocaleString()}位 / ${totalUsers.toLocaleString()}人中`;
        document.getElementById('score-display').textContent = `獲得スコア: ${totalScore}点 (満点: ${maxPossible}点)`;
        
        const resList = document.getElementById('result-list');
        resList.innerHTML = '';
        
        scoreLog.forEach(item => {
            const div = document.createElement('div');
            const sign = item.score > 0 ? `+${item.score}` : `${item.score}`;
            div.className = `result-item res-${sign}`;
            
            // アドバイスのHTML生成（0点以下の悪手を選んだ場合のみ表示）
            let adviceHtml = '';
            if (item.score <= 0 && item.advice) {
                adviceHtml = `<div class="advice-box">💡【改善アドバイス】<br>${item.advice}</div>`;
            }

            div.innerHTML = `
                <div style="font-size:0.85em; color:var(--gray); font-weight:bold;">${item.category}</div>
                <div style="font-weight:bold; margin:8px 0; font-size:1.1em;">Q. ${item.qText}</div>
                <div style="font-size:1em; margin-bottom:10px;">あなたの選択: <span style="font-weight:bold; color:#333;">「${item.selectedText}」</span></div>
                <span class="badge bg-${sign}">判定: ${sign}点</span>
                <div class="exp-box">${item.exp}</div>
                ${adviceHtml}
            `;
            resList.appendChild(div);
        });
    }

    // 初期化
    loadQuiz();
</script>
</body>
</html>
